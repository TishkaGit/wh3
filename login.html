<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Aboba Warehouse</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Плавающая кнопка переключения темы -->
    <button id="themeToggle" class="floating-theme-toggle" title="Переключить тему">🌙</button>

    <div class="login-container">
        <div class="login-header">
            <h1>Aboba Warehouse</h1>
            <p>Войдите в систему</p>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="login" required placeholder="Введите логин">
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="Введите пароль">
            </div>
            
            <button type="submit" class="login-button">
                Войти
                <div class="spinner" style="display: none;"></div>
            </button>
        </form>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/login.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initThemeToggle();
        });
    </script>
</body>
</html>
